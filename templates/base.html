{% load static %}
<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">

    <title>ID's | Identificación inteligente para mascotas</title>

    <link rel="icon" type="image/png" href="https://res-console.cloudinary.com/dcutgvqcy/thumbnails/v1/image/upload/v1781583598/bG9nb19JRF9TX2NpcmN1bGFyXzFfemY1bmpp/preview">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        :root {
            --ids-black: #050505;
            --ids-dark: #0b0b0b;
            --ids-red: #e50914;
            --ids-red-glow: rgba(229, 9, 20, 0.45);
            --ids-white: #ffffff;
            --ids-gray: #d0d0d0;
            --ids-soft: #171717;
        }

        body.ids-body {
            background:
                radial-gradient(circle at top, rgba(229, 9, 20, 0.16), transparent 35%),
                var(--ids-black);
            color: var(--ids-white);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(0, 0, 0, 0.88) !important;
            border-bottom: 1px solid rgba(229, 9, 20, 0.28);
            backdrop-filter: blur(14px);
        }

        .navbar a {
            color: #ffffff !important;
            font-weight: 500;
        }

        .navbar a:hover {
            color: var(--ids-red) !important;
        }

        .navbar-logo {
            height: 58px;
            object-fit: contain;
        }

        .btn {
            transition: all 0.2s ease-in-out;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--ids-red);
            border-color: var(--ids-red);
            box-shadow: 0 0 18px var(--ids-red-glow);
        }

        .btn-primary:hover {
            background: #ff1a1a;
            border-color: #ff1a1a;
        }

        .ids-card {
            background: linear-gradient(180deg, #151515, #0d0d0d);
            border: 1px solid rgba(229, 9, 20, 0.28);
            color: white;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.12);
        }

        .ids-muted {
            color: var(--ids-gray);
        }

        .ids-red-text {
            color: var(--ids-red);
        }

        .ids-icon {
            color: var(--ids-red);
            font-size: 2rem;
            text-shadow: 0 0 14px var(--ids-red-glow);
        }

        .ids-hero-title {
            font-size: clamp(3rem, 8vw, 6.5rem);
            line-height: 0.95;
            letter-spacing: -3px;
            text-transform: uppercase;
        }

        .ids-section {
            padding-top: 5rem;
            padding-bottom: 5rem;
        }

        @media (max-width: 768px) {
            .navbar-logo {
                height: 48px;
            }

            .ids-hero-title {
                letter-spacing: -1px;
            }

            .navbar .container {
                gap: 1rem;
            }
        }
    </style>
</head>

<body class="ids-body">

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container py-2">

        <a class="navbar-brand d-flex align-items-center" href="/">
            <img src="https://res-console.cloudinary.com/dcutgvqcy/thumbnails/v1/image/upload/v1781583598/bG9nb19JRF9TX2NpcmN1bGFyXzFfemY1bmpp/preview"
                 class="navbar-logo"
                 alt="ID's Mascotas">
        </a>

        <div class="d-flex align-items-center gap-2 flex-wrap justify-content-end">

            <a href="/" class="btn btn-link text-decoration-none">
                Inicio
            </a>

            <a href="#como-funciona" class="btn btn-link text-decoration-none">
                Cómo funciona
            </a>

            <a href="/registrar/" class="btn btn-primary rounded-pill px-4">
                Registrar
            </a>

        </div>

    </div>
</nav>

<main>
    {% block content %}
    {% endblock %}
</main>

</body>

</html>
